<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Student Score</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-section {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-10 form-section">
                <h2 class="text-center mb-4 text-primary">Ma'lumotlarni kiritish</h2>
                
                <form action="/predictdata" method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <h5 class="mb-3">Raqamli ko'rsatkichlar</h5>
                            
                            <div class="mb-3">
                                <label class="form-label">Hours Studied (Soat)</label>
                                <input type="number" step="any" class="form-control" name="Hours_Studied" required placeholder="Masalan: 4.5">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Attendance (%)</label>
                                <input type="number" step="any" class="form-control" name="Attendance" required placeholder="Masalan: 85">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Sleep Hours</label>
                                <input type="number" step="any" class="form-control" name="Sleep_Hours" required placeholder="Masalan: 7">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Previous Scores</label>
                                <input type="number" step="any" class="form-control" name="Previous_Scores" required placeholder="Masalan: 75.5">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tutoring Sessions</label>
                                <input type="number" step="any" class="form-control" name="Tutoring_Sessions" required placeholder="Masalan: 2">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Physical Activity (Soat)</label>
                                <input type="number" step="any" class="form-control" name="Physical_Activity" required placeholder="Masalan: 3">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <h5 class="mb-3">Kategorik omillar</h5>
                            
                            <div class="mb-3">
                                <label class="form-label">Gender</label>
                                <select class="form-select" name="Gender" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Distance from Home</label>
                                <select class="form-select" name="Distance_from_Home" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Near">Near</option>
                                    <option value="Moderate">Moderate</option>
                                    <option value="Far">Far</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Parental Involvement</label>
                                <select class="form-select" name="Parental_Involvement" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Access to Resources</label>
                                <select class="form-select" name="Access_to_Resources" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Extracurricular Activities</label>
                                <select class="form-select" name="Extracurricular_Activities" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Yes">Yes</option>
                                    <option value="No">No</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Motivation Level</label>
                                <select class="form-select" name="Motivation_Level" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Internet Access</label>
                                <select class="form-select" name="Internet_Access" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Yes">Yes</option>
                                    <option value="No">No</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Family Income</label>
                                <select class="form-select" name="Family_Income" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teacher Quality</label>
                                <select class="form-select" name="Teacher_Quality" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">School Type</label>
                                <select class="form-select" name="School_Type" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Public">Public</option>
                                    <option value="Private">Private</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Peer Influence</label>
                                <select class="form-select" name="Peer_Influence" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Negative">Negative</option>
                                    <option value="Neutral">Neutral</option>
                                    <option value="Positive">Positive</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Learning Disabilities</label>
                                <select class="form-select" name="Learning_Disabilities" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="Yes">Yes</option>
                                    <option value="No">No</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Parental Education Level</label>
                                <select class="form-select" name="Parental_Education_Level" required>
                                    <option value="" selected disabled>Tanlang...</option>
                                    <option value="High School">High School</option>
                                    <option value="College">College</option>
                                    <option value="Postgraduate">Postgraduate</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">Bashoratni ko'rish</button>
                    </div>
                </form>

                {% if results is not none %}
                <div class="alert alert-info mt-5 text-center" role="alert">
                    <h3 class="alert-heading">Bashorat qilingan natija:</h3>
                    <h1 class="display-5 fw-bold">{{ results }}</h1>
                </div>
                {% endif %}
                
            </div>
        </div>
    </div>
</body>
</html>
